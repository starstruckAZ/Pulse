<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b4a"/>
      <stop offset="100%" stop-color="#ff3d71"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <!-- MessageSquare icon (simplified Lucide style) -->
  <!-- Main bubble rectangle -->
  <rect x="6" y="6" width="20" height="15" rx="2.5" fill="none" stroke="white" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Tail -->
  <path d="M9 21 L7 26 L14 22" fill="white" stroke="white" stroke-width="1" stroke-linejoin="round"/>
  <!-- Three dots / lines inside bubble -->
  <line x1="10" y1="11.5" x2="22" y2="11.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="10" y1="15" x2="18" y2="15" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
</svg>
